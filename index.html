<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>네이버 경제 뉴스 날짜별 제목 수집</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #667085;
      --line: #d9e1ec;
      --accent: #10a37f;
      --accent-strong: #078765;
      --danger: #c73e4a;
      --soft: #e8f6f1;
      --positive: #067647;
      --positive-bg: #ecfdf3;
      --negative: #b42318;
      --negative-bg: #fef3f2;
      --neutral: #475467;
      --neutral-bg: #f2f4f7;
      --shadow: 0 16px 45px rgba(20, 30, 43, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Malgun Gothic", AppleSDGothicNeo, sans-serif;
    }

    main {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .source-link {
      color: var(--accent-strong);
      font-size: 14px;
      text-decoration: none;
      white-space: nowrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      display: flex;
      flex-direction: column;	/* 첫째줄과 둘째줄을 위아래로 배치 */
      gap: 15px;	
      align-items: start;       /* 왼쪽 정렬로 변경 */
      padding: 18px 18px 12px;
    }

    /* 첫 번째 줄 (날짜, 페이지 + 버튼 그룹) */
    .basic-settings {
      display: flex;
      gap: 15px; 
      align-items: flex-end; /* 입력창과 버튼의 아랫줄을 맞춤 */
      width: 100%;
      flex-wrap: wrap;
    }

    .basic-settings label {
      width: 180px; 
    }

    /* 버튼들을 감싸는 영역 */
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-left: auto; /* 입력창과 버튼 사이 여백 */
    }

    /* 두 번째 줄 (문구 조건 6개 항목) */
    .keyword-filter-group {
      display: flex;
      gap: 10px; 
      flex-wrap: nowrap; /* 절대 줄바꿈 되지 않고 한 줄로 유지 */
      width: 100%;
    }

    /* 문구 조건 내의 각 label 요소들을 균등하게 배분 */
    .keyword-filter-group label {
      flex: 1; /* 가로 공간을 공평하게 나눠 가짐 */
      display: flex;
      flex-direction: column;
      min-width: 0; /* flex 아이템 찌그러짐 방지 */
    }

    /* 인풋창 크기 최적화 */
    .keyword-filter-group input,
    .keyword-filter-group select {
      width: 100%;
      box-sizing: border-box;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 11px;
      color: var(--text);
      background: #fff;
      font-size: 15px;
      font-family: inherit;
    }

    input[type="checkbox"] {
      width: 18px;
      min-height: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(16, 163, 127, 0.15);
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap; /* 버튼 글자 잘림 방지 */
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .secondary {
      color: var(--accent-strong);
      background: var(--soft);
      border: 1px solid #bde8dc;
    }

    .secondary:hover {
      color: #fff;
      background: var(--accent-strong);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 46px;
      padding: 0 18px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .status strong {
      color: var(--text);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      white-space: nowrap;
    }

    .error {
      display: none;
      margin: 0 18px 16px;
      padding: 12px 14px;
      border: 1px solid #f0bcc2;
      border-radius: 8px;
      color: var(--danger);
      background: #fff3f4;
      font-size: 14px;
      line-height: 1.55;
    }

    .error.show {
      display: block;
    }

    .table-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: #475467;
      background: #f8fafc;
      font-size: 13px;
    }

    td:first-child,
    th:first-child {
      width: 48px;
      text-align: center;
      color: var(--muted);
    }

    td:nth-child(2),
    th:nth-child(2) {
      width: 58px;
      text-align: right;
      color: var(--muted);
    }

    .title-cell a {
      color: var(--text);
      font-weight: 750;
      text-decoration: none;
    }

    .title-cell a:hover {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      min-height: 26px;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.positive {
      color: var(--positive);
      background: var(--positive-bg);
    }

    .badge.negative {
      color: var(--negative);
      background: var(--negative-bg);
    }

    .badge.neutral {
      color: var(--neutral);
      background: var(--neutral-bg);
    }

    .empty {
      padding: 54px 18px;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 920px) {
      .basic-settings {
        flex-direction: column;
        align-items: flex-start;
      }
      .basic-settings label {
        width: 100%;
      }
      .action-buttons {
        margin-left: 0;
        width: 100%;
        display: gird;
        grid-template-columns: repeat(2, 1fr);
      }
      .action-buttons button {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 1200px);
        padding-top: 22px;
      }

      .topbar {
        display: block;
      }

      .source-link {
        display: inline-block;
        margin-top: 10px;
      }

      .status {
        display: block;
      }

      .meta {
        justify-content: flex-start;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>네이버 경제 뉴스 크롤링</h1>
        <p class="subtitle">날짜와 제목 조건을 선택하면 네이버 금융 경제 뉴스 제목을 가져와 감정 분석과 CSV 저장까지 처리합니다.</p>
      </div>
      <a class="source-link" href="https://finance.naver.com/news/news_list.naver?mode=LSS2D&section_id=101&section_id2=258" target="_blank" rel="noreferrer">네이버 금융 뉴스 열기</a>
    </div>

    <section class="panel" aria-label="뉴스 수집 도구">
      <div class="controls">
        <!-- 첫 번째 줄: 기본 설정 + 버튼 그룹 병합 -->
        <div class="basic-settings">
          <label>
            날짜
            <input id="dateInput" type="date">
          </label>
          <label>
            가져올 페이지
            <input id="pageInput" type="number" min="1" max="50" value="3">
          </label>
          
          <!-- 버튼 그룹은 입력창 바로 옆에 위치 -->
          <div class="action-buttons">
            <button id="resetInputsButton" class="secondary" type="button">입력 초기화</button>
            <button id="resetSelectedButton" class="secondary" type="button" disabled>선택 초기화</button>
            <button id="csvButton" class="secondary" type="button" disabled>CSV 저장</button>
            <button id="fetchButton" type="button">뉴스 가져오기</button>
          </div>
        </div>

        <!-- 두 번째 줄: 문구 조건 검색 영역 -->
        <div class="keyword-filter-group">
          <label>
            문구 조건
            <select id="conditionInput">
              <option value="or">OR</option>
              <option value="and">AND</option>
            </select>
          </label>
          <label>
            문구 1
            <input id="keywordInput1" type="text" maxlength="40" placeholder="예: 삼성전자">
          </label>
          <label>
            문구 2
            <input id="keywordInput2" type="text" maxlength="40" placeholder="예: 삼전">
          </label>
          <label>
            문구 3
            <input id="keywordInput3" type="text" maxlength="40" placeholder="예: 코스피">
          </label>
          <label>
            문구 4
            <input id="keywordInput4" type="text" maxlength="40" placeholder="예: KOSPI">
          </label>
          <label>
            문구 5
            <input id="keywordInput5" type="text" maxlength="40" placeholder="예: 환율">
          </label>
        </div>
      </div>

      <!-- 기존 하단 .actions 디브는 제거되었습니다 -->

      <div class="status">
        <span id="statusText">날짜를 고르고 뉴스 가져오기를 눌러주세요.</span>
        <span class="meta">
          <span>표시 <strong id="countText">0</strong>건</span>
          <span>선택 <strong id="selectedText">0</strong>건</span>
        </span>
      </div>
      <div id="errorBox" class="error" role="alert"></div>

      <div class="table-wrap" id="tableWrap" hidden>
        <table>
          <thead>
            <tr>
              <th><input id="selectAllInput" type="checkbox" aria-label="전체 선택"></th>
              <th>번호</th>
              <th>제목</th>
              <th>감정</th>
              <th>점수</th>
              <th>언론사</th>
              <th>작성일시</th>
              <th>페이지</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
      <div id="emptyBox" class="empty">아직 표시할 뉴스가 없습니다.</div>
    </section>
  </main>

  <script>
    const NAVER_BASE = "https://finance.naver.com/news/news_list.naver";
    const POSITIVE_WORDS = [
      "상승", "급등", "강세", "호실적", "최대", "개선", "회복", "성장", "확대", "돌파",
      "흑자", "수혜", "기대", "낙관", "인상", "신고가", "반등", "증가", "매수", "완화"
    ];
    const NEGATIVE_WORDS = [
      "하락", "급락", "약세", "손실", "적자", "부진", "우려", "공포", "충격", "위기",
      "폭락", "감소", "매도", "인하", "침체", "경고", "불안", "압박", "리스크", "상폐"
    ];

    const state = {
      rows: [],
      selectedIds: new Set(),
      selectedDate: ""
    };

    const dateInput = document.querySelector("#dateInput");
    const pageInput = document.querySelector("#pageInput");
    const conditionInput = document.querySelector("#conditionInput");
    const keywordInputs = [
      document.querySelector("#keywordInput1"),
      document.querySelector("#keywordInput2"),
      document.querySelector("#keywordInput3")
    ];
    const fetchButton = document.querySelector("#fetchButton");
    const csvButton = document.querySelector("#csvButton");
    const resetSelectedButton = document.querySelector("#resetSelectedButton");
    const resetInputsButton = document.querySelector("#resetInputsButton");
    const selectAllInput = document.querySelector("#selectAllInput");
    const statusText = document.querySelector("#statusText");
    const countText = document.querySelector("#countText");
    const selectedText = document.querySelector("#selectedText");
    const errorBox = document.querySelector("#errorBox");
    const resultBody = document.querySelector("#resultBody");
    const tableWrap = document.querySelector("#tableWrap");
    const emptyBox = document.querySelector("#emptyBox");

    dateInput.value = toDateInputValue(new Date());

    fetchButton.addEventListener("click", fetchNews);
    csvButton.addEventListener("click", downloadCsv);
    resetSelectedButton.addEventListener("click", resetSelectedRows);
    resetInputsButton.addEventListener("click", resetInputs);
    selectAllInput.addEventListener("change", toggleAllRows);
    resultBody.addEventListener("change", handleRowSelection);

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function toNaverDate(dateValue) {
      return dateValue.replaceAll("-", "");
    }

    function buildNaverUrl(dateValue, page) {
      const params = new URLSearchParams({
        mode: "LSS2D",
        section_id: "101",
        section_id2: "258",
        date: toNaverDate(dateValue),
        page: String(page)
      });
      return `${NAVER_BASE}?${params.toString()}`;
    }

    function proxyCandidates(url) {
      return [
        url,
        `https://proxy.cors.sh/${url}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://r.jina.ai/http://r.jina.ai/http://${url}`
      ];
    }

    async function fetchText(url) {
      let lastError;
      for (const candidate of proxyCandidates(url)) {
        try {
          const text = await requestText(candidate);
          if (text.includes("articleSubject") || text.includes("news_read.naver")) {
            return text;
          }
          lastError = new Error("뉴스 목록을 찾지 못했습니다.");
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("네이버 뉴스 페이지를 가져오지 못했습니다.");
    }

    async function requestText(url) {
      if (typeof fetch === "function") {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`응답 코드 ${response.status}`);
        }
        const buffer = await response.arrayBuffer();
        const contentType = response.headers.get("content-type") || "";
        return decodeResponseBuffer(buffer, contentType);
      }

      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open("GET", url, true);
        if (request.overrideMimeType) {
          request.overrideMimeType("text/html; charset=euc-kr");
        }
        request.timeout = 25000;
        request.onload = () => {
          if (request.status >= 200 && request.status < 300) {
            resolve(request.responseText);
          } else {
            reject(new Error(`응답 코드 ${request.status}`));
          }
        };
        request.onerror = () => reject(new Error("네트워크 요청 실패"));
        request.ontimeout = () => reject(new Error("요청 시간 초과"));
        request.send();
      });
    }

    function decodeResponseBuffer(buffer, contentType) {
      const lowerType = contentType.toLowerCase();
      const encoding = lowerType.includes("euc-kr") || lowerType.includes("ks_c_5601")
        ? "euc-kr"
        : "utf-8";

      if (typeof TextDecoder === "function") {
        try {
          return new TextDecoder(encoding).decode(buffer);
        } catch (error) {
          return new TextDecoder("utf-8").decode(buffer);
        }
      }

      let binary = "";
      const bytes = new Uint8Array(buffer);
      for (let index = 0; index < bytes.length; index += 1) {
        binary += String.fromCharCode(bytes[index]);
      }
      return decodeURIComponent(escape(binary));
    }

    async function fetchNews() {
      const dateValue = dateInput.value;
      const pageCount = Math.max(1, Math.min(50, Number(pageInput.value) || 1));
      const keywords = getKeywords();

      if (!dateValue) {
        showError("날짜를 먼저 선택해주세요.");
        return;
      }

      setLoading(true);
      clearError();
      state.rows = [];
      state.selectedIds.clear();
      state.selectedDate = dateValue;
      renderRows();

      try {
        for (let page = 1; page <= pageCount; page += 1) {
          statusText.textContent = `${dateValue} 뉴스 ${page}/${pageCount} 페이지를 가져오는 중입니다.`;
          const url = buildNaverUrl(dateValue, page);
          const text = await fetchText(url);
          const rows = parseNews(text, page)
            .filter((row) => matchesKeywordFilter(row.title, keywords, conditionInput.value))
            .map((row) => ({ ...row, sentiment: analyzeSentiment(row.title) }));
          state.rows.push(...rows);
          state.rows = uniqueRows(state.rows);
          renderRows();
        }

        if (state.rows.length === 0) {
          statusText.textContent = `${dateValue} 조건에 맞는 경제 뉴스 제목을 찾지 못했습니다.`;
        } else {
          statusText.innerHTML = `<strong>${dateValue}</strong> 기준 뉴스 제목을 가져왔습니다.`;
        }
      } catch (error) {
        showError(`뉴스를 가져오지 못했습니다. 잠시 후 다시 시도해주세요. 세부 오류: ${error.message}`);
        statusText.textContent = "오류가 발생했습니다.";
      } finally {
        setLoading(false);
      }
    }

    function getKeywords() {
      return keywordInputs
        .map((input) => input.value.trim().toLowerCase())
        .filter(Boolean)
        .slice(0, 3);
    }

    function matchesKeywordFilter(title, keywords, condition) {
      if (keywords.length === 0) {
        return true;
      }
      const normalizedTitle = title.toLowerCase();
      return condition === "and"
        ? keywords.every((keyword) => normalizedTitle.includes(keyword))
        : keywords.some((keyword) => normalizedTitle.includes(keyword));
    }

    function analyzeSentiment(title) {
      const positiveHits = countKeywordHits(title, POSITIVE_WORDS);
      const negativeHits = countKeywordHits(title, NEGATIVE_WORDS);
      const score = positiveHits - negativeHits;

      if (score > 0) {
        return { label: "긍정", type: "positive", score };
      }
      if (score < 0) {
        return { label: "부정", type: "negative", score };
      }
      return { label: "중립", type: "neutral", score };
    }

    function countKeywordHits(title, keywords) {
      return keywords.reduce((total, keyword) => {
        return title.includes(keyword) ? total + 1 : total;
      }, 0);
    }

    function parseNews(text, page) {
      if (text.includes("articleSubject")) {
        return parseHtmlNews(text, page);
      }
      return parseMarkdownNews(text, page);
    }

    function parseHtmlNews(html, page) {
      const doc = new DOMParser().parseFromString(html, "text/html");
      const subjects = Array.from(doc.querySelectorAll("dd.articleSubject"));

      return subjects.map((subject) => {
        const link = subject.querySelector("a");
        const summary = subject.nextElementSibling;
        const press = summary?.querySelector(".press")?.textContent.trim() || "";
        const datetime = summary?.querySelector(".wdate")?.textContent.trim() || "";
        return {
          id: buildRowId(link?.getAttribute("href") || "", page),
          title: cleanTitle(link?.getAttribute("title") || link?.textContent.trim() || ""),
          press,
          datetime,
          page,
          url: absoluteNaverUrl(link?.getAttribute("href") || "")
        };
      }).filter((row) => row.title);
    }

    function parseMarkdownNews(markdown, page) {
      const rows = [];
      const pattern = /\[([^\]\n]+)\]\((https:\/\/finance\.naver\.com\/news\/news_read\.naver\?[^)\s]+)(?:\s+"[^"]*")?\)([\s\S]*?)([가-힣A-Za-z0-9&.\s·]+)\|(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})/g;
      let match;

      while ((match = pattern.exec(markdown)) !== null) {
        const title = cleanTitle(match[1]);
        if (title.startsWith("Image ") || title === "이전 뉴스보기" || title === "다음 뉴스보기") {
          continue;
        }
        rows.push({
          id: buildRowId(match[2], page),
          title,
          press: match[4].trim(),
          datetime: match[5].trim(),
          page,
          url: match[2].replaceAll("&amp;", "&")
        });
      }

      return rows;
    }

    function uniqueRows(rows) {
      const seen = new Set();
      return rows.filter((row) => {
        const key = `${row.title}|${row.datetime}|${row.url}`;
        if (seen.has(key)) {
          return false;
        }
        seen.add(key);
        return true;
      });
    }

    function buildRowId(source, page) {
      return `${page}-${source}`.replace(/[^a-zA-Z0-9가-힣_-]/g, "_");
    }

    function absoluteNaverUrl(href) {
      if (!href) {
        return "";
      }
      return href.startsWith("http") ? href : `https://finance.naver.com${href}`;
    }

    function cleanTitle(value) {
      return decodeHtml(value)
        .replace(/\s+/g, " ")
        .trim();
    }

    function decodeHtml(value) {
      const textarea = document.createElement("textarea");
      textarea.innerHTML = value;
      return textarea.value;
    }

    function renderRows() {
      countText.textContent = String(state.rows.length);
      selectedText.textContent = String(state.selectedIds.size);
      resultBody.innerHTML = "";

      state.rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        const isChecked = state.selectedIds.has(row.id);
        tr.innerHTML = `
          <td><input class="row-check" type="checkbox" data-id="${escapeHtml(row.id)}" aria-label="${index + 1}번 선택" ${isChecked ? "checked" : ""}></td>
          <td>${index + 1}</td>
          <td class="title-cell"></td>
          <td><span class="badge ${row.sentiment.type}">${row.sentiment.label}</span></td>
          <td>${row.sentiment.score}</td>
          <td>${escapeHtml(row.press)}</td>
          <td>${escapeHtml(row.datetime)}</td>
          <td>${row.page}</td>
        `;

        const titleCell = tr.querySelector(".title-cell");
        const link = document.createElement("a");
        link.href = row.url;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = row.title;
        titleCell.append(link);
        resultBody.append(tr);
      });

      const hasRows = state.rows.length > 0;
      tableWrap.hidden = !hasRows;
      emptyBox.hidden = hasRows;
      csvButton.disabled = !hasRows;
      resetSelectedButton.disabled = state.selectedIds.size === 0;
      syncSelectAll();
    }

    function handleRowSelection(event) {
      if (!event.target.classList.contains("row-check")) {
        return;
      }

      const id = event.target.dataset.id;
      if (event.target.checked) {
        state.selectedIds.add(id);
      } else {
        state.selectedIds.delete(id);
      }

      selectedText.textContent = String(state.selectedIds.size);
      resetSelectedButton.disabled = state.selectedIds.size === 0;
      syncSelectAll();
    }

    function toggleAllRows() {
      if (selectAllInput.checked) {
        state.rows.forEach((row) => state.selectedIds.add(row.id));
      } else {
        state.selectedIds.clear();
      }
      renderRows();
    }

    function resetSelectedRows() {
      state.selectedIds.clear();
      renderRows();
    }

    function resetInputs() {
      // 1. 날짜를 오늘 날짜로 리셋
      dateInput.value = toDateInputValue(new Date());
      // 2. 가져올 페이지 수를 기본값인 3으로 리셋
      pageInput.value = "3";
      // 3. 문구 조건(OR/AND)을 기본값으로 리셋
      conditionInput.value = "or";
      // 4. 문구 1번부터 5번까지의 입력창을 모두 빈칸으로 만듭니다.
      document.querySelector("#keywordInput1").value = "";
      document.querySelector("#keywordInput2").value = "";
      document.querySelector("#keywordInput3").value = "";
      document.querySelector("#keywordInput4").value = "";
      document.querySelector("#keywordInput5").value = "";  
      // 5. 안내 메시지도 처음 상태로 되돌립니다.
      statusText.textContent = "날짜를 고르고 뉴스 가져오기를 눌러주세요.";
    }

    function syncSelectAll() {
      const hasRows = state.rows.length > 0;
      const selectedCount = state.selectedIds.size;
      selectAllInput.disabled = !hasRows;
      selectAllInput.checked = hasRows && selectedCount === state.rows.length;
      selectAllInput.indeterminate = selectedCount > 0 && selectedCount < state.rows.length;
    }

    function downloadCsv() {
      const rowsToSave = getRowsToSave();
      if (rowsToSave.length === 0) {
        return;
      }

      const header = ["번호", "날짜", "제목", "감정", "감정점수", "언론사", "작성일시", "페이지", "URL"];
      const lines = [
        header,
        ...rowsToSave.map((row, index) => [
          index + 1,
          state.selectedDate,
          row.title,
          row.sentiment.label,
          row.sentiment.score,
          row.press,
          row.datetime,
          row.page,
          row.url
        ])
      ].map((columns) => columns.map(csvEscape).join(","));

      const suffix = state.selectedIds.size > 0 ? "_selected" : "";
      const blob = new Blob(["\ufeff" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `naver_economy_news_${toNaverDate(state.selectedDate)}${suffix}.csv`;
      document.body.append(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function getRowsToSave() {
      if (state.selectedIds.size === 0) {
        return state.rows;
      }
      return state.rows.filter((row) => state.selectedIds.has(row.id));
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setLoading(isLoading) {
      fetchButton.disabled = isLoading;
      fetchButton.textContent = isLoading ? "가져오는 중..." : "뉴스 가져오기";
      csvButton.disabled = isLoading || state.rows.length === 0;
      resetSelectedButton.disabled = isLoading || state.selectedIds.size === 0;
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    function clearError() {
      errorBox.textContent = "";
      errorBox.classList.remove("show");
    }
  </script>
</body>
</html>
